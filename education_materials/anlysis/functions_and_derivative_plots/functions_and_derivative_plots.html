<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор графиков функций</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: linear-gradient(145deg, #0b0b1a, #1a1a2e, #16213e);
            --panel: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #00d2ff;
            --accent2: #f953c6;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff5252;
            --yellow: #ffd700;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.5;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 28px; }
        header h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
        header p { color: var(--text-dim); font-size: 0.95rem; }

        .controls {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }
        .input-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .label { font-weight: 600; color: var(--accent); font-family: monospace; font-size: 1.1rem; }
        input[type="text"] {
            flex: 1; min-width: 220px; padding: 10px 14px; font-size: 1rem;
            background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px;
            color: #fff; font-family: 'JetBrains Mono', monospace;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,210,255,0.2); }

        .btn {
            padding: 10px 18px; font-size: 0.9rem; font-weight: 600; border: none; border-radius: 10px;
            cursor: pointer; transition: all 0.2s; background: var(--accent); color: #000;
        }
        .btn:hover { transform: translateY(-1px); filter: brightness(1.1); }
        .btn.outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn.outline:hover { background: rgba(255,255,255,0.1); border-color: var(--text); }
        .btn.small { padding: 8px 12px; font-size: 0.85rem; }

        .options-row { display: flex; gap: 16px; margin-top: 14px; flex-wrap: wrap; align-items: center; }
        .toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; color: var(--text-dim); font-size: 0.9rem; }
        .toggle input { accent-color: var(--accent); }

        /* Presets Popup */
        #presetsPanel {
            position: absolute; top: calc(100% + 8px); left: 0; right: 0;
            background: rgba(15, 15, 25, 0.95); backdrop-filter: blur(12px);
            border: 1px solid var(--border); border-radius: 14px;
            padding: 16px; display: none; z-index: 50; box-shadow: 0 12px 32px rgba(0,0,0,0.5);
        }
        #presetsPanel.open { display: block; animation: fadeIn 0.2s ease; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
        .preset-group h4 { color: var(--accent); font-size: 0.85rem; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        .preset-btn {
            display: inline-block; padding: 6px 10px; margin: 3px 4px 3px 0; background: rgba(255,255,255,0.06);
            border: 1px solid transparent; border-radius: 6px; color: var(--text-dim); cursor: pointer;
            font-family: monospace; font-size: 0.9rem; transition: all 0.2s;
        }
        .preset-btn:hover { background: rgba(0,210,255,0.15); color: var(--accent); border-color: rgba(0,210,255,0.3); }

        .canvas-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .canvas-container.vertical { grid-template-columns: 1fr; }
        .canvas-container.vertical canvas { height: 420px; }
        .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 16px; position: relative; }
        .panel h3 { text-align: center; margin-bottom: 12px; font-weight: 500; color: var(--text-dim); font-size: 0.95rem; }
        canvas { width: 100%; height: 450px; background: rgba(0,0,0,0.3); border-radius: 10px; cursor: grab; display: block; }
        canvas:active { cursor: grabbing; }

        .tooltip {
            position: absolute; background: rgba(10, 10, 15, 0.92); color: #fff; padding: 8px 12px;
            border-radius: 8px; font-size: 0.85rem; pointer-events: none; z-index: 40; display: none;
            border: 1px solid rgba(255,255,255,0.15); font-family: monospace; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
            white-space: nowrap;
        }
        .tooltip .trend { font-weight: 600; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.15); }
        .trend.inc { color: var(--green); } .trend.dec { color: var(--red); } .trend.stat { color: var(--yellow); }

        .zoom-controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 16px; }
        .hint { text-align: center; color: var(--text-dim); font-size: 0.8rem; opacity: 0.7; margin-top: 8px; }
        .error { color: var(--red); font-size: 0.85rem; margin-top: 10px; display: none; font-weight: 500; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 800px) { .canvas-container { grid-template-columns: 1fr; } canvas { height: 360px; } header h1 { font-size: 1.8rem; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📈 Графики функций</h1>
        <p>Визуализация f(x), производной и монотонности</p>
    </header>

    <div class="controls">
        <div class="input-row">
            <span class="label">f(x) =</span>
            <input type="text" id="funcInput" value="sin(x) * x" placeholder="например: x^3 - 3*x">
            <button class="btn" id="plotBtn">Построить</button>
            <button class="btn outline" id="presetsBtn">📚 Примеры</button>
        </div>

        <div id="presetsPanel">
            <div class="preset-grid">
                <div class="preset-group">
                    <h4>Тригонометрия</h4>
                    <button class="preset-btn" data-f="sin(x)">sin(x)</button>
                    <button class="preset-btn" data-f="cos(x)">cos(x)</button>
                    <button class="preset-btn" data-f="tan(x)">tan(x)</button>
                    <button class="preset-btn" data-f="sin(x)/x">sin(x)/x</button>
                    <button class="preset-btn" data-f="x*sin(x)">x·sin(x)</button>
                    <button class="preset-btn" data-f="sin(x^2)">sin(x²)</button>
                </div>
                <div class="preset-group">
                    <h4>Полиномы</h4>
                    <button class="preset-btn" data-f="x^2">x²</button>
                    <button class="preset-btn" data-f="x^3">x³</button>
                    <button class="preset-btn" data-f="x^3 - 3*x">x³ - 3x</button>
                    <button class="preset-btn" data-f="x^4 - 2*x^2">x⁴ - 2x²</button>
                </div>
                <div class="preset-group">
                    <h4>Экспоненты / Логарифмы</h4>
                    <button class="preset-btn" data-f="exp(x)">eˣ</button>
                    <button class="preset-btn" data-f="exp(-x^2)">e^(-x²)</button>
                    <button class="preset-btn" data-f="log(x)">ln(x)</button>
                    <button class="preset-btn" data-f="x*log(x)">x·ln(x)</button>
                    <button class="preset-btn" data-f="1/(1+exp(-x))">Сигмоида</button>
                </div>
                <div class="preset-group">
                    <h4>Рациональные / Особые</h4>
                    <button class="preset-btn" data-f="1/x">1/x</button>
                    <button class="preset-btn" data-f="sqrt(x)">√x</button>
                    <button class="preset-btn" data-f="abs(x)">|x|</button>
                    <button class="preset-btn" data-f="atan(x)">arctan(x)</button>
                    <button class="preset-btn" data-f="cos(1/x)">cos(1/x)</button>
                </div>
            </div>
        </div>

        <div class="options-row">
            <label class="toggle"><input type="checkbox" id="show2nd"> <span>Показать f''(x)</span></label>
            <button class="btn small outline" id="layoutBtn">⬇️ Вертикально</button>
        </div>
        <div class="error" id="errorMsg"></div>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="panel">
            <h3>📊 Функция f(x)</h3>
            <canvas id="fCanvas"></canvas>
            <div class="tooltip" id="fTip"></div>
        </div>
        <div class="panel">
            <h3>📉 Производная f'(x)</h3>
            <canvas id="dfCanvas"></canvas>
            <div class="tooltip" id="dfTip"></div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="btn small" onclick="zoom(0.85)">➕ Приблизить</button>
        <button class="btn small" onclick="zoom(1.15)">➖ Отдалить</button>
        <button class="btn small outline" onclick="resetView()">🔄 Сброс</button>
    </div>
    <p class="hint">🖱️ Зажмите ЛКМ для перемещения • Колесико для масштаба • Наведите курсор для анализа монотонности</p>
</div>

<script>
    // State
    let xMin = -10, xMax = 10, yMin = -10, yMax = 10;
    let currentFunc = null;
    let hoverX = null;
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    let show2nd = false;
    let ctxF, ctxDF, wF, hF, wDF, hDF;

    // Init Canvas
    function initCanvas(id) {
        const c = document.getElementById(id);
        const dpr = window.devicePixelRatio || 1;
        const rect = c.getBoundingClientRect();
        c.width = rect.width * dpr; c.height = rect.height * dpr;
        const ctx = c.getContext('2d');
        ctx.scale(dpr, dpr);
        return { ctx, w: rect.width, h: rect.height };
    }

    function initAll() {
        const f = initCanvas('fCanvas');
        ctxF = f.ctx; wF = f.w; hF = f.h;
        const df = initCanvas('dfCanvas');
        ctxDF = df.ctx; wDF = df.w; hDF = df.h;
    }
    window.addEventListener('resize', () => { initAll(); if(currentFunc) render(); });

    // Parser
    function parse(expr) {
        let p = expr.replace(/\^/g, '**').replace(/PI/g, 'Math.PI').replace(/(?<![a-zA-Z])E(?![a-zA-Z])/g, 'Math.E')
            .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(')
            .replace(/asin\(/g, 'Math.asin(').replace(/acos\(/g, 'Math.acos(').replace(/atan\(/g, 'Math.atan(')
            .replace(/exp\(/g, 'Math.exp(').replace(/log\(/g, 'Math.log(').replace(/ln\(/g, 'Math.log(')
            .replace(/sqrt\(/g, 'Math.sqrt(').replace(/abs\(/g, 'Math.abs(');
        p = p.replace(/(\d)([a-zA-Z(])/g, '$1*$2').replace(/(\))(\()/g, '$1*$2');
        try { return new Function('x', `try{return ${p};}catch(e){return NaN;}`); } catch { return null; }
    }

    // Derivatives
    const deriv = (f, x) => { const h = 1e-7; const y1 = f(x+h), y2 = f(x-h); return (isNaN(y1)||isNaN(y2)||!isFinite(y1)||!isFinite(y2))? NaN : (y1-y2)/(2*h); };
    const deriv2 = (f, x) => { const h = 1e-5; const y0=f(x), y1=f(x+h), y2=f(x-h); return (isNaN(y0)||isNaN(y1)||isNaN(y2)||!isFinite(y0)||!isFinite(y1)||!isFinite(y2))? NaN : (y1-2*y0+y2)/(h*h); };

    // Drawing Helpers
    function fmt(n) { return Math.abs(n)>=1e3 ? n.toExponential(0) : (Math.abs(n)<0.01 && n!==0 ? n.toExponential(1) : parseFloat(n.toPrecision(4)).toString()); }

    function drawGrid(ctx, w, h, xMin, xMax, yMin, yMax) {
        const xR = xMax - xMin, yR = yMax - yMin;
        if(xR<1e-6 || yR<1e-6) return;
        ctx.clearRect(0,0,w,h); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,w,h);
        const step = r => { const m=Math.pow(10, Math.floor(Math.log10(r/10))), res=(r/10)/m; return res<=1.5?m:res<=3.5?2*m:res<=7.5?5*m:10*m; };
        const sX = step(xR), sY = step(yR);
        ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
        for(let x=Math.floor(xMin/sX)*sX; x<=xMax; x+=sX) { const px=(x-xMin)/xR*w; ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke(); }
        for(let y=Math.floor(yMin/sY)*sY; y<=yMax; y+=sY) { const py=h-(y-yMin)/yR*h; ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(w,py); ctx.stroke(); }
        ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
        const axY = h - (0-yMin)/yR*h;
        if(axY>=0 && axY<=h) { ctx.beginPath(); ctx.moveTo(0,axY); ctx.lineTo(w,axY); ctx.stroke(); }
        const axX = (0-xMin)/xR*w;
        if(axX>=0 && axX<=w) { ctx.beginPath(); ctx.moveTo(axX,0); ctx.lineTo(axX,h); ctx.stroke(); }
        ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='11px system-ui'; ctx.textAlign='center';
        for(let x=Math.floor(xMin/sX)*sX; x<=xMax; x+=sX) { if(Math.abs(x)<sX*0.01) continue; ctx.fillText(fmt(x), (x-xMin)/xR*w, Math.min(Math.max(axY+15,15),h-5)); }
        ctx.textAlign='right';
        for(let y=Math.floor(yMin/sY)*sY; y<=yMax; y+=sY) { if(Math.abs(y)<sY*0.01) continue; ctx.fillText(fmt(y), Math.min(Math.max(axX-8,35),w-5), h-(y-yMin)/yR*h+4); }
        if(axX>=0 && axX<=w && axY>=0 && axY<=h) ctx.fillText('0', axX-8, axY+15);
    }

    function drawCurve(ctx, w, h, xMin, xMax, yMin, yMax, f, color, width=2.5) {
        const xR = xMax-xMin, yR = yMax-yMin; if(xR<1e-6) return;
        const steps = w*2, dx = xR/steps;
        ctx.strokeStyle=color; ctx.lineWidth=width; ctx.lineJoin='round'; ctx.beginPath();
        let started=false, prevY=null;
        for(let i=0; i<=steps; i++) {
            const x=xMin+i*dx, y=f(x);
            if(isNaN(y)||!isFinite(y)) { started=false; prevY=null; continue; }
            if(prevY!==null && Math.abs(y-prevY) > yR*4) started=false;
            const px=(x-xMin)/xR*w, py=h-(y-yMin)/yR*h;
            if(!started) { ctx.moveTo(px,py); started=true; } else { ctx.lineTo(px,py); }
            prevY=y;
        }
        ctx.stroke();
    }

    // === НОВАЯ ВИЗУАЛИЗАЦИЯ МОНТОННОСТИ ===

    // Точка на графике функции
    function drawHoverPoint(ctx, w, h, xMin, xMax, yMin, yMax, f, hx) {
        if(hx===null || hx<xMin || hx>xMax) return;
        const y = f(hx);
        if(isNaN(y) || !isFinite(y)) return;
        const dy = deriv(f, hx);
        if(isNaN(dy) || !isFinite(dy)) return;

        const xR = xMax-xMin, yR = yMax-yMin;
        const px = (hx-xMin)/xR*w, py = h-(y-yMin)/yR*h;

        // Цвет по знаку производной
        const color = dy > 1e-8 ? '#00ff88' : dy < -1e-8 ? '#ff5252' : '#ffd700';

        // Точка
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI*2); ctx.stroke();
    }

    // Вертикальная полоса на графике производной (только в точке hoverX)
    function drawDerivHoverBand(ctx, w, h, xMin, xMax, yMin, yMax, f, hx) {
        if(hx===null || hx<xMin || hx>xMax) return;
        const dy = f(hx);
        if(isNaN(dy) || !isFinite(dy)) return;

        const xR = xMax-xMin, yR = yMax-yMin;
        const px = (hx-xMin)/xR*w;
        const zeroY = h - (0-yMin)/yR*h;
        const py = h - (dy-yMin)/yR*h;

        // Цвет по знаку
        const color = dy > 1e-8 ? 'rgba(0,255,136,0.25)' : dy < -1e-8 ? 'rgba(255,82,82,0.25)' : 'rgba(255,215,0,0.25)';

        // Полоса от оси X до значения производной
        ctx.fillStyle = color;
        const bandW = Math.max(8, w * 0.015);
        const y1 = Math.min(py, zeroY), y2 = Math.max(py, zeroY);
        ctx.fillRect(px - bandW/2, y1, bandW, y2 - y1);

        // Точка на кривой производной
        const pointColor = dy > 1e-8 ? '#00ff88' : dy < -1e-8 ? '#ff5252' : '#ffd700';
        ctx.fillStyle = pointColor;
        ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(px, py, 5, 0, Math.PI*2); ctx.stroke();
    }

    // Main Render
    function render() {
        if(!currentFunc) return;

        // Функция
        drawGrid(ctxF, wF, hF, xMin, xMax, yMin, yMax);
        drawCurve(ctxF, wF, hF, xMin, xMax, yMin, yMax, currentFunc, '#00d2ff', 3);
        if(hoverX!==null) drawHoverPoint(ctxF, wF, hF, xMin, xMax, yMin, yMax, currentFunc, hoverX);

        // Производная
        const df = x => deriv(currentFunc, x);
        drawGrid(ctxDF, wDF, hDF, xMin, xMax, yMin, yMax);
        drawCurve(ctxDF, wDF, hDF, xMin, xMax, yMin, yMax, df, '#f953c6', 2.5);
        if(hoverX!==null) drawDerivHoverBand(ctxDF, wDF, hDF, xMin, xMax, yMin, yMax, df, hoverX);

        // Вторая производная (опционально)
        if(show2nd) {
            const d2 = x => deriv2(currentFunc, x);
            drawCurve(ctxDF, wDF, hDF, xMin, xMax, yMin, yMax, d2, '#ffd700', 2);
        }
    }

    function plot() {
        const val = document.getElementById('funcInput').value.trim();
        const err = document.getElementById('errorMsg');
        if(!val) { err.textContent='Введите функцию'; err.style.display='block'; return; }
        const f = parse(val);
        if(!f) { err.textContent='Ошибка синтаксиса'; err.style.display='block'; return; }
        err.style.display='none'; currentFunc = f; hoverX = null;

        // Auto scale
        const testX = [-10,-5,-2,-1,-0.5,0,0.5,1,2,5,10], ys = [];
        testX.forEach(x => { const y=f(x); if(!isNaN(y)&&isFinite(y)&&Math.abs(y)<1e3) ys.push(y); });
        if(ys.length===0) { xMin=-10;xMax=10;yMin=-10;yMax=10; }
        else {
            const mn=Math.min(...ys), mx=Math.max(...ys), pad=Math.max((mx-mn)*0.2, 2);
            yMin=mn-pad; yMax=mx+pad;
            if(yMax-yMin>100) { yMin=Math.max(yMin,-50); yMax=Math.min(yMax,50); }
        }
        render();
    }

    // Interaction
    function setupInteraction(canvasId, tipId, isDeriv=false) {
        const c = document.getElementById(canvasId); const tip = document.getElementById(tipId);
        c.addEventListener('mousedown', e => { if(e.button===0) { isDragging=true; dragStart={x:e.clientX,y:e.clientY}; c.style.cursor='grabbing'; e.preventDefault(); } });
        window.addEventListener('mousemove', e => {
            if(isDragging) {
                const dx=e.clientX-dragStart.x, dy=e.clientY-dragStart.y; dragStart={x:e.clientX,y:e.clientY};
                const xR=xMax-xMin, yR=yMax-yMin;
                xMin-=dx/wF*xR; xMax-=dx/wF*xR; yMin-=dy/hF*yR; yMax-=dy/hF*yR;
                render(); tip.style.display='none'; return;
            }
            if(!currentFunc) return;
            const rect=c.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top;
            if(mx<0||my<0||mx>rect.width||my>rect.height) { tip.style.display='none'; hoverX=null; render(); return; }
            hoverX = xMin + (mx/rect.width)*(xMax-xMin);
            const y = isDeriv ? deriv(currentFunc, hoverX) : currentFunc(hoverX);
            if(isNaN(y)||!isFinite(y)) { tip.style.display='none'; render(); return; }
            const dy = deriv(currentFunc, hoverX);
            const tr = dy>1e-8?'▲ возрастает (f\' > 0)' : dy<-1e-8?'▼ убывает (f\' < 0)' : '● стационарна (f\' ≈ 0)';
            const cls = dy>1e-8?'inc' : dy<-1e-8?'dec' : 'stat';
            tip.innerHTML = `x = ${hoverX.toFixed(4)}<br>${isDeriv?"f'(x)":"f(x)"} = ${y.toFixed(6)}<div class="trend ${cls}">${tr}</div>`;
            tip.style.display='block'; tip.style.left=(mx+12)+'px'; tip.style.top=(my-55)+'px';
            render();
        });
        window.addEventListener('mouseup', () => { if(isDragging) { isDragging=false; c.style.cursor='grab'; } });
        c.addEventListener('wheel', e => {
            e.preventDefault(); const rect=c.getBoundingClientRect(); const mx=e.clientX-rect.left, my=e.clientY-rect.top;
            const xR=xMax-xMin, yR=yMax-yMin; const wx=xMin+mx/rect.width*xR, wy=yMax-my/rect.height*yR; const f=e.deltaY>0?1.15:0.85;
            xMin=wx-(wx-xMin)*f; xMax=wx+(xMax-wx)*f; yMin=wy-(wy-yMin)*f; yMax=wy+(yMax-wy)*f; render();
        }, {passive:false});
        c.addEventListener('mouseleave', () => { tip.style.display='none'; hoverX=null; render(); });
    }

    // UI Controls
    document.getElementById('plotBtn').onclick = plot;
    document.getElementById('funcInput').onkeydown = e => { if(e.key==='Enter') plot(); };
    document.getElementById('show2nd').onchange = e => { show2nd=e.target.checked; render(); };
    document.getElementById('layoutBtn').onclick = function() {
        document.getElementById('canvasContainer').classList.toggle('vertical');
        this.textContent = document.getElementById('canvasContainer').classList.contains('vertical') ? '⬅️ Горизонтально' : '⬇️ Вертикально';
        setTimeout(()=>{ initAll(); if(currentFunc) render(); }, 10);
    };

    window.zoom = factor => { const cx=(xMin+xMax)/2, cy=(yMin+yMax)/2, xr=(xMax-xMin)/2, yr=(yMax-yMin)/2; xMin=cx-xr/factor; xMax=cx+xr/factor; yMin=cy-yr/factor; yMax=cy+yr/factor; render(); };
    window.resetView = () => { xMin=-10;xMax=10;yMin=-10;yMax=10; plot(); };

    // Presets
    const pBtn = document.getElementById('presetsBtn'), pPanel = document.getElementById('presetsPanel');
    pBtn.onclick = e => { e.stopPropagation(); pPanel.classList.toggle('open'); };
    document.addEventListener('click', e => { if(!pPanel.contains(e.target) && e.target!==pBtn) pPanel.classList.remove('open'); });
    document.querySelectorAll('.preset-btn').forEach(b => {
        b.onclick = () => { document.getElementById('funcInput').value = b.dataset.f; pPanel.classList.remove('open'); plot(); };
    });

    // Init
    window.addEventListener('load', () => { initAll(); setupInteraction('fCanvas', 'fTip', false); setupInteraction('dfCanvas', 'dfTip', true); plot(); });
</script>
</body>
</html>
