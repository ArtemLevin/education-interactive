<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор графиков функций и производных</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --pink: #f953c6;
            --green: #00ff88;
            --red: #ff5252;
            --yellow: #ffd700;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: #e0e0e0; min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; padding: 20px 0 10px; }
        header h1 { font-size: 2.2em; background: linear-gradient(45deg, #00d2ff, #3a7bd5, #f953c6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        header p { font-size: 0.95em; color: #a0a0b0; }
        .hint { font-size: 0.8em; color: #7eb8f7; margin: 10px 0 20px; opacity: 0.8; }

        .controls { background: var(--glass); backdrop-filter: blur(10px); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--glass-border); }
        .input-group { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .input-group label { font-weight: 600; color: #7eb8f7; }
        .function-input { flex: 1; min-width: 280px; padding: 10px 16px; font-size: 1.1em; border: 2px solid rgba(255,255,255,0.2); border-radius: 10px; background: rgba(0,0,0,0.3); color: #fff; font-family: monospace; transition: 0.3s; }
        .function-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 12px rgba(0,210,255,0.3); }
        .btn { padding: 10px 20px; font-size: 1em; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: linear-gradient(45deg, var(--accent), #3a7bd5); color: #fff; }
        .btn-secondary { background: linear-gradient(45deg, var(--pink), #b91d73); color: #fff; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
        .presets { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--glass-border); }
        .preset-btn { padding: 6px 12px; background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border); border-radius: 6px; color: #e0e0e0; cursor: pointer; font-family: monospace; font-size: 0.85em; transition: 0.2s; }
        .preset-btn:hover { background: rgba(0,210,255,0.2); border-color: var(--accent); }

        .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; background: var(--glass); border-radius: 12px; padding: 8px; border: 1px solid var(--glass-border); justify-content: center; }
        .toggle-chip { padding: 6px 12px; background: rgba(255,255,255,0.08); border-radius: 18px; cursor: pointer; font-size: 0.85em; transition: 0.2s; border: 1px solid transparent; user-select: none; }
        .toggle-chip.active { background: rgba(0,210,255,0.2); border-color: var(--accent); color: var(--accent); }
        .toggle-chip:hover { background: rgba(255,255,255,0.15); }

        .canvas-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .canvas-container.vertical { grid-template-columns: 1fr; }
        .canvas-container.vertical canvas { height: 400px; }
        .graph-panel { background: var(--glass); border-radius: 16px; padding: 15px; border: 1px solid var(--glass-border); position: relative; }
        .graph-panel h3 { text-align: center; margin-bottom: 10px; color: #7eb8f7; font-size: 1.1em; }
        canvas { width: 100%; height: 450px; background: rgba(0,0,0,0.3); border-radius: 10px; cursor: grab; display: block; }
        canvas:active { cursor: grabbing; }

        .tooltip { position: absolute; background: rgba(0,0,0,0.9); color: #fff; padding: 8px 10px; border-radius: 8px; font-size: 0.85em; pointer-events: none; z-index: 50; display: none; border: 1px solid rgba(0,210,255,0.5); font-family: monospace; }
        .trend { font-weight: bold; margin-top: 4px; padding-top: 4px; border-top: 1px solid rgba(255,255,255,0.2); }
        .trend.increasing { color: var(--green); }
        .trend.decreasing { color: var(--red); }
        .trend.stationary { color: var(--yellow); }

        .error-box { background: rgba(255,82,82,0.15); border: 1px solid var(--red); color: var(--red); padding: 10px 15px; border-radius: 8px; margin-top: 10px; display: none; font-size: 0.9em; }
        .zoom-controls { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 10px auto 20px; }

        .info-panel { background: var(--glass); border-radius: 14px; padding: 15px; border: 1px solid var(--glass-border); margin-bottom: 20px; display: none; }
        .info-panel.visible { display: block; }
        .info-panel table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        .info-panel th, .info-panel td { padding: 6px 10px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .info-panel th { color: #a0a0b0; }
        .info-panel td { font-family: monospace; color: #fff; }

        .recent-list { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; font-size: 0.85em; }
        .recent-item { padding: 5px 10px; background: rgba(0,0,0,0.3); border-radius: 6px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .recent-item:hover { border-color: var(--accent); color: var(--accent); }

        @media (max-width: 850px) { .canvas-container { grid-template-columns: 1fr; } canvas { height: 350px; } header h1 { font-size: 1.6em; } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>📈 Генератор графиков и производных</h1>
        <p>Визуализация функций, численное дифференцирование и анализ</p>
        <div class="hint">🖱️ Drag: перемещение | Колесо: масштаб | Наведение: анализ | Клавиши: ←→↑↓ +/- R T I E</div>
    </header>

    <div class="controls">
        <div class="input-group">
            <label>f(x) =</label>
            <input type="text" class="function-input" id="functionInput" value="sin(x) * x" placeholder="например: x^3 - 2*x">
            <button class="btn btn-primary" id="plotBtn">Построить</button>
            <button class="btn btn-secondary" id="clearBtn">Очистить</button>
        </div>
        <div class="presets">
            <span style="color:#808080;margin-right:5px;">Примеры:</span>
            <button class="preset-btn" onclick="setPreset('sin(x)')">sin(x)</button>
            <button class="preset-btn" onclick="setPreset('x^2')">x²</button>
            <button class="preset-btn" onclick="setPreset('x^3 - 3*x')">x³-3x</button>
            <button class="preset-btn" onclick="setPreset('exp(x)')">eˣ</button>
            <button class="preset-btn" onclick="setPreset('tan(x)')">tan(x)</button>
            <button class="preset-btn" onclick="setPreset('log(x)')">ln(x)</button>
            <button class="preset-btn" onclick="setPreset('sin(x)/x')">sin(x)/x</button>
            <button class="preset-btn" onclick="setPreset('exp(-x^2)')">e^(-x²)</button>
        </div>
        <div class="recent-list" id="recentList"></div>
        <div class="error-box" id="errorMsg"></div>
    </div>

    <div class="toolbar">
        <div class="toggle-chip" id="toggleTangent">📐 Касательная</div>
        <div class="toggle-chip" id="toggleIntegral">📊 Интеграл</div>
        <div class="toggle-chip" id="toggleKeyPoints">📍 Точки</div>
        <button class="btn" style="padding:6px 12px;font-size:0.85em;background:var(--accent);color:#000;" id="exportBtn">📷 PNG</button>
        <button class="btn" style="padding:6px 12px;font-size:0.85em;background:var(--pink);color:#fff;" id="shareBtn">🔗 Share</button>
    </div>

    <div class="canvas-container" id="canvasContainer">
        <div class="graph-panel">
            <h3>📊 f(x)</h3>
            <canvas id="functionCanvas" width="600" height="450"></canvas>
            <div class="tooltip" id="functionTooltip"></div>
        </div>
        <div class="graph-panel">
            <h3>📉 f'(x)</h3>
            <canvas id="derivativeCanvas" width="600" height="450"></canvas>
            <div class="tooltip" id="derivativeTooltip"></div>
        </div>
    </div>

    <div class="zoom-controls">
        <button class="btn" onclick="zoomIn()" style="background:var(--accent);color:#000;">➕ Приблизить</button>
        <button class="btn" onclick="zoomOut()" style="background:var(--accent);color:#000;">➖ Отдалить</button>
        <button class="btn" onclick="resetView()" style="background:#666;color:#fff;">🔄 Сброс</button>
        <button class="btn" onclick="toggleLayout()" style="background:var(--accent);color:#000;" id="layoutBtn">⬇️ Вертикально</button>
    </div>

    <div class="info-panel" id="keyPointsPanel">
        <table><tr><th>Тип</th><th>Координаты</th></tr><tbody id="keyPointsBody"></tbody></table>
    </div>
</div>

<script>
    (function() {
        'use strict';

        // Состояние
        let state = { xMin: -10, xMax: 10, yMin: -10, yMax: 10, func: null, isDragging: false, dragStartX: 0, dragStartY: 0, hoverX: null, showTangent: false, showIntegral: false, showKeyPoints: false, isScaled: false };
        let canvases = { f: null, d: null }, ctxs = { f: null, d: null }, dims = { fW: 600, fH: 450, dW: 600, dH: 450 };

        // Инициализация Canvas с защитой от нулевых размеров
        function initCanvases() {
            const f = document.getElementById('functionCanvas');
            const d = document.getElementById('derivativeCanvas');
            const dpr = window.devicePixelRatio || 1;

            const resizeCanvas = (c, key) => {
                const rect = c.getBoundingClientRect();
                const w = Math.max(300, rect.width || 600);
                const h = Math.max(200, rect.height || 450);
                c.width = w * dpr; c.height = h * dpr;
                ctxs[key] = c.getContext('2d');
                ctxs[key].scale(dpr, dpr);
                dims[key === 'f' ? 'fW' : 'dW'] = w;
                dims[key === 'f' ? 'fH' : 'dH'] = h;
                return { w, h };
            };

            resizeCanvas(f, 'f');
            resizeCanvas(d, 'd');

            // Отслеживание изменения размера
            if (window.ResizeObserver) {
                new ResizeObserver(() => { initCanvases(); render(); }).observe(document.querySelector('.container'));
            }
        }

        // Безопасный парсер
        function parse(expr) {
            let s = expr.replace(/\^/g, '**').replace(/PI/g, 'Math.PI').replace(/(?<![a-zA-Z])E(?![a-zA-Z])/g, 'Math.E')
                .replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(')
                .replace(/exp\(/g, 'Math.exp(').replace(/log\(/g, 'Math.log(').replace(/ln\(/g, 'Math.log(')
                .replace(/sqrt\(/g, 'Math.sqrt(').replace(/abs\(/g, 'Math.abs(');
            s = s.replace(/(\d)([a-zA-Z(])/g, '$1*$2').replace(/(\))(\()/g, '$1*$2');
            try { return new Function('x', `try{return ${s};}catch(e){return NaN;}`); } catch { return null; }
        }

        // Математика
        const der = (f, x) => { const h = 1e-7, y1 = f(x+h), y2 = f(x-h); return (isFinite(y1)&&isFinite(y2)) ? (y1-y2)/(2*h) : NaN; };
        const der2 = (f, x) => { const h = 1e-5, y0=f(x), y1=f(x+h), y2=f(x-h); return (isFinite(y0)&&isFinite(y1)&&isFinite(y2)) ? (y1-2*y0+y2)/(h*h) : NaN; };
        const fmt = n => Math.abs(n)>=1000 ? n.toExponential(1) : parseFloat(n.toPrecision(5)).toString();

        // Отрисовка
        function drawGrid(ctx, w, h, xMin, xMax, yMin, yMax) {
            const xr = xMax - xMin, yr = yMax - yMin;
            if (xr < 0.1 || yr < 0.1) return;
            ctx.clearRect(0,0,w,h); ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fillRect(0,0,w,h);
            const stepX = Math.pow(10, Math.floor(Math.log10(xr/10)));
            const stepY = Math.pow(10, Math.floor(Math.log10(yr/10)));
            ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1;
            for(let x=Math.ceil(xMin/stepX)*stepX; x<=xMax; x+=stepX) { const p=(x-xMin)/xr*w; ctx.beginPath(); ctx.moveTo(p,0); ctx.lineTo(p,h); ctx.stroke(); }
            for(let y=Math.ceil(yMin/stepY)*stepY; y<=yMax; y+=stepY) { const p=h-(y-yMin)/yr*h; ctx.beginPath(); ctx.moveTo(0,p); ctx.lineTo(w,p); ctx.stroke(); }
            ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=2;
            const y0 = h - (0-yMin)/yr*h, x0 = (0-xMin)/xr*w;
            if(y0>=0 && y0<=h) { ctx.beginPath(); ctx.moveTo(0,y0); ctx.lineTo(w,y0); ctx.stroke(); }
            if(x0>=0 && x0<=w) { ctx.beginPath(); ctx.moveTo(x0,0); ctx.lineTo(x0,h); ctx.stroke(); }
            ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.font='10px monospace'; ctx.textAlign='center';
            for(let x=Math.ceil(xMin/stepX)*stepX; x<=xMax; x+=stepX) { if(Math.abs(x)<stepX*0.1) continue; ctx.fillText(fmt(x), (x-xMin)/xr*w, Math.min(Math.max(y0+14,14),h-4)); }
            ctx.textAlign='right';
            for(let y=Math.ceil(yMin/stepY)*stepY; y<=yMax; y+=stepY) { if(Math.abs(y)<stepY*0.1) continue; ctx.fillText(fmt(y), Math.min(Math.max(x0-6,25),w-5), h-(y-yMin)/yr*h+3); }
        }

        function drawCurve(ctx, w, h, f, xMin, xMax, yMin, yMax, color, lw=2) {
            const xr=xMax-xMin, yr=yMax-yMin; if(xr<0.1||yr<0.1) return;
            const steps=Math.floor(w*2), dx=xr/steps; ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.lineJoin='round'; ctx.beginPath(); let started=false, py=null;
            for(let i=0;i<=steps;i++) {
                const x=xMin+i*dx, y=f(x); if(!isFinite(y)) { started=false; py=null; continue; }
                const px=(x-xMin)/xr*w, cy=h-(y-yMin)/yr*h;
                if(py!==null && Math.abs(cy-py)>yr*4) { started=false; ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.setLineDash([3,3]); ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,h); ctx.stroke(); ctx.restore(); }
                if(!started) { ctx.moveTo(px,cy); started=true; } else { ctx.lineTo(px,cy); }
                py=cy;
            } ctx.stroke();
        }

        function drawHighlight(ctx, w, h, f, xMin, xMax, yMin, yMax, hx, type) {
            if(hx==null||hx<xMin||hx>xMax) return; const dy=der(f,hx); if(!isFinite(dy)) return; const xr=xMax-xMin, yr=yMax-yMin; if(xr<0.1||yr<0.1) return;
            if(type==='f') {
                const sw=Math.max(0.2, xr*0.02), steps=50, dx=sw*2/steps;
                const c=dy>1e-8?'rgba(0,255,136,0.8)':dy<-1e-8?'rgba(255,82,82,0.8)':'rgba(255,215,0,0.8)';
                ctx.strokeStyle=c; ctx.lineWidth=5; ctx.lineCap='round'; ctx.beginPath(); let s=false;
                for(let i=0;i<=steps;i++) { const x=hx-sw+i*dx; if(x<xMin||x>xMax) continue; const y=f(x); if(!isFinite(y)){s=false;continue;} const px=(x-xMin)/xr*w, cy=h-(y-yMin)/yr*h; if(!s){ctx.moveTo(px,cy);s=true;} else ctx.lineTo(px,cy); } if(s) ctx.stroke();
            } else {
                const steps=w*2, dx=xr/steps, y0=h-(0-yMin)/yr*h;
                ctx.fillStyle='rgba(0,255,136,0.1)'; ctx.beginPath(); let inP=false;
                for(let i=0;i<=steps;i++) { const x=xMin+i*dx, y=f(x), px=(x-xMin)/xr*w, cy=h-(y-yMin)/yr*h; if(y>1e-9&&isFinite(y)){if(!inP){ctx.moveTo(px,y0);inP=true;}ctx.lineTo(px,cy);} else if(inP){ctx.lineTo(px,y0);ctx.closePath();ctx.fill();ctx.beginPath();inP=false;} }
                if(inP){ctx.lineTo(w,y0);ctx.closePath();ctx.fill();}
                ctx.fillStyle='rgba(255,82,82,0.1)'; let inN=false;
                for(let i=0;i<=steps;i++) { const x=xMin+i*dx, y=f(x), px=(x-xMin)/xr*w, cy=h-(y-yMin)/yr*h; if(y<-1e-9&&isFinite(y)){if(!inN){ctx.moveTo(px,y0);inN=true;}ctx.lineTo(px,cy);} else if(inN){ctx.lineTo(px,y0);ctx.closePath();ctx.fill();ctx.beginPath();inN=false;} }
                if(inN){ctx.lineTo(w,y0);ctx.closePath();ctx.fill();}
            }
        }

        function drawTangent(ctx, w, h, f, xMin, xMax, yMin, yMax, x0) {
            if(!state.showTangent||x0==null) return; const y0=f(x0), dy=der(f,x0); if(!isFinite(y0)||!isFinite(dy)) return; const xr=xMax-xMin, yr=yMax-yMin; if(xr<0.1||yr<0.1) return;
            ctx.strokeStyle='rgba(255,215,0,0.7)'; ctx.lineWidth=1.5; ctx.setLineDash([6,3]); ctx.beginPath();
            const y1=y0+dy*(xMin-x0), y2=y0+dy*(xMax-x0);
            ctx.moveTo(0, h-(y1-yMin)/yr*h); ctx.lineTo(w, h-(y2-yMin)/yr*h); ctx.stroke(); ctx.setLineDash([]);
            const px=(x0-xMin)/xr*w, py=h-(y0-yMin)/yr*h; ctx.fillStyle='#ffd700'; ctx.beginPath(); ctx.arc(px,py,4,0,Math.PI*2); ctx.fill();
        }

        function drawIntegral(ctx, w, h, f, xMin, xMax, yMin, yMax) {
            if(!state.showIntegral) return; const xr=xMax-xMin, yr=yMax-yMin; if(xr<0.1||yr<0.1) return;
            const steps=300, dx=xr/steps, y0=h-(0-yMin)/yr*h; ctx.fillStyle='rgba(0,150,255,0.15)'; ctx.beginPath(); let s=false, area=0;
            for(let i=0;i<=steps;i++) { const x=xMin+i*dx, y=f(x); if(!isFinite(y)){if(s){ctx.closePath();ctx.fill();ctx.beginPath();s=false;}continue;} const px=(x-xMin)/xr*w, cy=h-(y-yMin)/yr*h; if(!s){ctx.moveTo(px,y0);ctx.lineTo(px,cy);s=true;} else ctx.lineTo(px,cy); area+=y*dx; }
            if(s){ctx.lineTo(w,y0);ctx.closePath();ctx.fill();}
            if(isFinite(area)&&Math.abs(area)<1e4) { ctx.fillStyle='rgba(0,150,255,0.8)'; ctx.font='bold 11px sans-serif'; ctx.textAlign='center'; ctx.fillText(`S≈${area.toFixed(2)}`, w/2, 20); }
        }

        function findPoints(f, xMin, xMax) {
            const pts={zeros:[],ext:[],inf:[]}, steps=800, dx=(xMax-xMin)/steps;
            for(let i=0;i<steps;i++) { const x=xMin+i*dx, y=f(x), dy=der(f,x), d2=der2(f,x); if(!isFinite(y)||!isFinite(dy)||!isFinite(d2)) continue;
                if(i>0) { const py=f(x-dx); if(isFinite(py)&&py*y<0) { let a=x-dx,b=x; for(let j=0;j<25;j++){const m=(a+b)/2; if(f(a)*f(m)<=0) b=m; else a=m;} pts.zeros.push({x:(a+b)/2}); }
                    const pdy=der(f,x-dx); if(isFinite(pdy)&&pdy*dy<0&&Math.abs(dy)<0.5) pts.ext.push({x,y});
                    const pd2=der2(f,x-dx); if(isFinite(pd2)&&pd2*d2<0) pts.inf.push({x,y}); }
            } return pts;
        }

        // Главный рендер
        function render() {
            if(!state.func) return;
            const f=state.func, wF=dims.fW, hF=dims.fH, wD=dims.dW, hD=dims.dH;
            const {xMin,xMax,yMin,yMax,hoverX}=state;

            drawGrid(ctxs.f, wF, hF, xMin, xMax, yMin, yMax);
            drawIntegral(ctxs.f, wF, hF, f, xMin, xMax, yMin, yMax);
            drawCurve(ctxs.f, wF, hF, f, xMin, xMax, yMin, yMax, '#00d2ff', 2.5);
            if(hoverX!=null) drawHighlight(ctxs.f, wF, hF, f, xMin, xMax, yMin, yMax, hoverX, 'f');
            drawTangent(ctxs.f, wF, hF, f, xMin, xMax, yMin, yMax, hoverX);
            const kp=findPoints(f, xMin, xMax);
            kp.zeros.forEach(p => { const px=(p.x-xMin)/(xMax-xMin)*wF, cy=hF-(0-yMin)/(yMax-yMin)*hF; ctxs.f.fillStyle='#00ff88'; ctxs.f.beginPath(); ctxs.f.arc(px,cy,4,0,Math.PI*2); ctxs.f.fill(); });
            kp.ext.forEach(p => { const px=(p.x-xMin)/(xMax-xMin)*wF, cy=hF-(p.y-yMin)/(yMax-yMin)*hF; ctxs.f.fillStyle='#ffd700'; ctxs.f.beginPath(); ctxs.f.arc(px,cy,4,0,Math.PI*2); ctxs.f.fill(); });

            const df = x => der(f,x);
            drawGrid(ctxs.d, wD, hD, xMin, xMax, yMin, yMax);
            drawHighlight(ctxs.d, wD, hD, df, xMin, xMax, yMin, yMax, hoverX, 'd');
            drawCurve(ctxs.d, wD, hD, df, xMin, xMax, yMin, yMax, '#f953c6', 2);
            if(hoverX!=null) drawTangent(ctxs.d, wD, hD, df, xMin, xMax, yMin, yMax, hoverX);

            updateKPTable(kp);
        }

        function build() {
            const inp = document.getElementById('functionInput').value.trim();
            const err = document.getElementById('errorMsg');
            if(!inp) { err.textContent='Введите функцию'; err.style.display='block'; return; }
            const f = parse(inp);
            if(!f) { err.textContent='Ошибка синтаксиса'; err.style.display='block'; return; }
            err.style.display='none';
            state.func = f; state.isScaled = false;
            autoScale(); render(); updateRecent(); updateURL();
        }

        function autoScale() {
            if(state.isScaled) return; const f=state.func; if(!f) return;
            const xs=[-10,-5,-2,-1,-0.5,0,0.5,1,2,5,10]; let ys=[];
            xs.forEach(x=>{ const y=f(x); if(isFinite(y)&&Math.abs(y)<500) ys.push(y); });
            if(ys.length) { const mn=Math.min(...ys), mx=Math.max(...ys), pad=Math.max((mx-mn)*0.2, 2); state.yMin=mn-pad; state.yMax=mx+pad; if(state.yMax-state.yMin>80){state.yMin=Math.max(state.yMin,-40); state.yMax=Math.min(state.yMax,40);} }
            state.isScaled=true;
        }

        function updateKPTable(pts) {
            const panel=document.getElementById('keyPointsPanel'), body=document.getElementById('keyPointsBody');
            if(!state.showKeyPoints) { panel.classList.remove('visible'); return; }
            body.innerHTML='';
            if(!pts.zeros.length && !pts.ext.length && !pts.inf.length) { body.innerHTML='<tr><td colspan="2" style="color:#888;">Точки не найдены</td></tr>'; panel.classList.add('visible'); return; }
            pts.zeros.forEach(p => body.innerHTML+=`<tr><td style="color:#00ff88;">🟢 Нуль</td><td>x ≈ ${p.x.toFixed(4)}</td></tr>`);
            pts.ext.slice(0,6).forEach(p => body.innerHTML+=`<tr><td style="color:#ffd700;">🟡 Экстр.</td><td>(${p.x.toFixed(2)}, ${p.y.toFixed(2)})</td></tr>`);
            pts.inf.slice(0,6).forEach(p => body.innerHTML+=`<tr><td style="color:#b91d73;">🟣 Перегиб</td><td>(${p.x.toFixed(2)}, ${p.y.toFixed(2)})</td></tr>`);
            panel.classList.add('visible');
        }

        // Управление
        window.setPreset = e => { document.getElementById('functionInput').value=e; build(); };
        window.zoomIn = () => { const cx=(state.xMin+state.xMax)/2, cy=(state.yMin+state.yMax)/2, rX=(state.xMax-state.xMin)*0.3, rY=(state.yMax-state.yMin)*0.3; state.xMin=cx-rX; state.xMax=cx+rX; state.yMin=cy-rY; state.yMax=cy+rY; render(); };
        window.zoomOut = () => { const cx=(state.xMin+state.xMax)/2, cy=(state.yMin+state.yMax)/2, rX=(state.xMax-state.xMin)*0.8, rY=(state.yMax-state.yMin)*0.8; state.xMin=cx-rX; state.xMax=cx+rX; state.yMin=cy-rY; state.yMax=cy+rY; render(); };
        window.resetView = () => { state.xMin=-10; state.xMax=10; state.yMin=-10; state.yMax=10; state.isScaled=false; autoScale(); render(); };
        window.toggleLayout = () => { document.getElementById('canvasContainer').classList.toggle('vertical'); document.getElementById('layoutBtn').textContent = document.getElementById('canvasContainer').classList.contains('vertical') ? '⬅️ Гориз.' : '⬇️ Верт.'; setTimeout(()=>{ initCanvases(); render(); }, 20); };

        function setupEvents(canvasId, tipId, isDer) {
            const c=document.getElementById(canvasId), tip=document.getElementById(tipId);
            c.addEventListener('mousedown', e => { if(e.button===0) { state.isDragging=true; state.dragStartX=e.clientX; state.dragStartY=e.clientY; c.style.cursor='grabbing'; e.preventDefault(); } });
            window.addEventListener('mousemove', e => {
                if(state.isDragging) { const dx=e.clientX-state.dragStartX, dy=e.clientY-state.dragStartY; state.dragStartX=e.clientX; state.dragStartY=e.clientY; const xr=state.xMax-state.xMin, yr=state.yMax-state.yMin; state.xMin-=dx/dims.fW*xr; state.xMax-=dx/dims.fW*xr; state.yMin-=dy/dims.fH*yr; state.yMax-=dy/dims.fH*yr; render(); tip.style.display='none'; return; }
                if(!state.func) return;
                const r=c.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
                if(mx<0||my<0||mx>r.width||my>r.height) { tip.style.display='none'; state.hoverX=null; render(); return; }
                state.hoverX=state.xMin+(mx/r.width)*(state.xMax-state.xMin);
                const y=isDer?der(state.func,state.hoverX):state.func(state.hoverX);
                if(!isFinite(y)) { tip.style.display='none'; render(); return; }
                const dy=der(state.func,state.hoverX), tr=dy>1e-8?'▲ Рост':dy<-1e-8?'▼ Убывание':'● Стационар', cls=dy>1e-8?'increasing':dy<-1e-8?'decreasing':'stationary';
                tip.innerHTML=`x=${state.hoverX.toFixed(3)}<br>${isDer?"f'":"f"}=${y.toFixed(4)}<div class="trend ${cls}">${tr}</div>`;
                tip.style.display='block'; tip.style.left=(mx+10)+'px'; tip.style.top=(my-50)+'px'; render();
            });
            window.addEventListener('mouseup', () => { if(state.isDragging) { state.isDragging=false; c.style.cursor='grab'; } });
            c.addEventListener('wheel', e => { e.preventDefault(); const r=c.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top; const xr=state.xMax-state.xMin, yr=state.yMax-state.yMin, wx=state.xMin+(mx/r.width)*xr, wy=state.yMax-(my/r.height)*yr, f=e.deltaY>0?1.15:0.85; state.xMin=wx-(wx-state.xMin)*f; state.xMax=wx+(state.xMax-wx)*f; state.yMin=wy-(wy-state.yMin)*f; state.yMax=wy+(state.yMax-wy)*f; render(); }, {passive:false});
            c.addEventListener('mouseleave', () => { tip.style.display='none'; state.hoverX=null; render(); });
        }

        // UI обработчики
        document.getElementById('plotBtn').onclick = build;
        document.getElementById('functionInput').onkeydown = e => { if(e.key==='Enter') build(); };
        document.getElementById('clearBtn').onclick = () => { document.getElementById('functionInput').value=''; state.func=null; state.hoverX=null; document.getElementById('errorMsg').style.display='none'; state.xMin=-10; state.xMax=10; state.yMin=-10; state.yMax=10; state.isScaled=false; initCanvases(); drawGrid(ctxs.f,dims.fW,dims.fH,state.xMin,state.xMax,state.yMin,state.yMax); drawGrid(ctxs.d,dims.dW,dims.dH,state.xMin,state.xMax,state.yMin,state.yMax); };
        document.getElementById('toggleTangent').onclick = function() { state.showTangent=!state.showTangent; this.classList.toggle('active'); render(); };
        document.getElementById('toggleIntegral').onclick = function() { state.showIntegral=!state.showIntegral; this.classList.toggle('active'); render(); };
        document.getElementById('toggleKeyPoints').onclick = function() { state.showKeyPoints=!state.showKeyPoints; this.classList.toggle('active'); render(); };
        document.getElementById('exportBtn').onclick = () => {
            const t=document.createElement('canvas'); t.width=dims.fW+dims.dW+40; t.height=Math.max(dims.fH,dims.dH)+40; const c=t.getContext('2d'); c.fillStyle='#0f0c29'; c.fillRect(0,0,t.width,t.height); c.drawImage(document.getElementById('functionCanvas'),0,30); c.drawImage(document.getElementById('derivativeCanvas'),dims.fW+40,30); c.fillStyle='#fff'; c.font='bold 18px sans-serif'; c.textAlign='center'; c.fillText('Графики',t.width/2,20); const a=document.createElement('a'); a.download='graph.png'; a.href=t.toDataURL(); a.click();
        };
        document.getElementById('shareBtn').onclick = () => navigator.clipboard.writeText(window.location.href).then(()=>alert('Ссылка скопирована'));

        // Сохранение
        function updateRecent() { const v=document.getElementById('functionInput').value.trim(); if(!v) return; let r=JSON.parse(localStorage.getItem('graphR')||'[]'); r=r.filter(x=>x!==v); r.unshift(v); if(r.length>5) r.pop(); localStorage.setItem('graphR',JSON.stringify(r)); renderRecent(); }
        function renderRecent() { const c=document.getElementById('recentList'); c.innerHTML=''; JSON.parse(localStorage.getItem('graphR')||'[]').forEach(x=>{ const s=document.createElement('span'); s.className='recent-item'; s.textContent=x.length>15?x.slice(0,15)+'…':x; s.onclick=()=>{ document.getElementById('functionInput').value=x; build(); }; c.appendChild(s); }); if(c.children.length) { const l=document.createElement('span'); l.style.cssText='color:#666;margin-right:4px;'; l.textContent='Недавние:'; c.prepend(l); } }
        function updateURL() { const f=document.getElementById('functionInput').value, u=new URL(window.location); u.searchParams.set('f',encodeURIComponent(f)); window.history.replaceState({},'',u); }
        function loadFromURL() { const p=new URLSearchParams(window.location.search).get('f'); if(p) { document.getElementById('functionInput').value=decodeURIComponent(p); build(); } }

        // Клавиши
        document.addEventListener('keydown', e => {
            if(document.activeElement.tagName==='INPUT') return; const k=e.key;
            if(k==='ArrowLeft') { state.xMin--; state.xMax--; render(); }
            else if(k==='ArrowRight') { state.xMin++; state.xMax++; render(); }
            else if(k==='ArrowUp') { state.yMin--; state.yMax--; render(); }
            else if(k==='ArrowDown') { state.yMin++; state.yMax++; render(); }
            else if(k==='+'||k==='=') zoomIn(); else if(k==='-') zoomOut();
            else if(k==='r'||k==='R') resetView();
            else if(k==='t'||k==='T') document.getElementById('toggleTangent').click();
            else if(k==='i'||k==='I') document.getElementById('toggleIntegral').click();
        });

        // Запуск
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                initCanvases(); renderRecent(); loadFromURL();
                setupEvents('functionCanvas', 'functionTooltip', false);
                setupEvents('derivativeCanvas', 'derivativeTooltip', true);
                if(!window.location.search.includes('f=')) build();
            }, 50);
        });
    })();
</script>
</body>
</html>
