<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Планиметрия: Интерактивный разбор | Лёвин А.А.</title>
    <style>
        :root {
            --bg: #0b0f14;
            --bg2: #121820;
            --bg3: #1a212b;
            --text: #e6edf3;
            --text2: #8b949e;
            --accent: #009688;
            --accent2: #26c6da;
            --accent-glow: rgba(0,150,136,0.35);
            --danger: #ef5350;
            --success: #66bb6a;
            --warn: #ffa726;
            --border: #2a303c;
            --radius: 8px;
            --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-main);
            line-height: 1.6;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== NAV ===== */
        .top-nav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        .nav-brand { font-weight: 700; color: var(--accent2); font-size: 16px; margin-right: auto; }
        .nav-tab {
            padding: 6px 12px; border-radius: 6px; background: transparent;
            color: var(--text2); border: 1px solid transparent; cursor: pointer;
            font-size: 13px; transition: all 0.2s;
        }
        .nav-tab:hover { color: var(--text); background: var(--bg3); }
        .nav-tab.active { color: var(--accent2); border-color: var(--accent); background: rgba(0,150,136,0.1); }
        .nav-btn {
            padding: 6px 10px; border-radius: 6px; background: var(--bg3);
            color: var(--text2); border: 1px solid var(--border); cursor: pointer;
            font-size: 12px; transition: all 0.2s;
        }
        .nav-btn:hover { color: var(--text); border-color: var(--accent); }

        /* ===== LAYOUT ===== */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px 16px 60px;
            align-items: start;
        }
        @media (max-width: 980px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* ===== STICKY PANEL ===== */
        .sticky-panel {
            position: sticky;
            top: 64px;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            max-height: calc(100vh - 80px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--bg3) transparent;
            transition: opacity 0.3s;
        }
        @media (max-width: 980px) {
            .sticky-panel { position: relative; top: 0; max-height: none; }
        }

        /* ===== CANVAS ===== */
        .canvas-wrap {
            position: relative; background: var(--bg); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden; margin-bottom: 12px;
            touch-action: none; user-select: none;
        }
        canvas#mainCanvas { display: block; width: 100%; height: auto; cursor: grab; }
        canvas#mainCanvas:active { cursor: grabbing; }
        .zoom-controls {
            display: flex; align-items: center; gap: 8px; padding: 8px 10px;
            background: var(--bg3); border-top: 1px solid var(--border);
        }
        .zoom-btn {
            width: 30px; height: 30px; border-radius: 6px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text); font-size: 16px;
            cursor: pointer; display: grid; place-items: center; transition: all 0.2s;
        }
        .zoom-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .zoom-slider { flex: 1; accent-color: var(--accent); height: 5px; }
        .zoom-val { font-size: 12px; color: var(--text2); min-width: 38px; text-align: center; font-variant-numeric: tabular-nums; }

        /* ===== CONTROLS & TOGGLES ===== */
        .toggle-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 8px; }
        .toggle-btn {
            padding: 5px 10px; border-radius: 5px; background: var(--bg);
            border: 1px solid var(--border); color: var(--text2); font-size: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .toggle-btn:hover { border-color: var(--accent); }
        .toggle-btn.on { background: rgba(0,150,136,0.15); border-color: var(--accent); color: var(--accent2); }
        .legend-box {
            display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0;
            padding: 8px; background: var(--bg); border-radius: 6px; font-size: 12px; color: var(--text2);
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; }

        /* ===== TYPOGRAPHY & BLOCKS ===== */
        h1 { font-size: 24px; color: var(--accent2); margin: 0 0 16px; line-height: 1.3; }
        h2 { font-size: 20px; color: var(--accent2); margin: 28px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
        h3 { font-size: 16px; color: var(--text); margin: 18px 0 8px; }
        p { margin-bottom: 10px; color: var(--text); }
        math { font-size: 1.05em; vertical-align: middle; }
        .step-block {
            background: var(--bg3); border-left: 3px solid var(--accent);
            padding: 14px 16px; margin: 12px 0; border-radius: 0 var(--radius) var(--radius) 0;
            transition: all 0.3s ease;
        }
        .step-block.highlight { border-left-color: var(--warn); box-shadow: 0 0 12px rgba(255,167,38,0.25); background: #232933; }
        .step-label { font-size: 11px; text-transform: uppercase; color: var(--accent); font-weight: 700; letter-spacing: 0.6px; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .idea-box {
            background: linear-gradient(135deg, rgba(0,150,136,0.12), rgba(0,150,136,0.04));
            border: 1px solid rgba(0,150,136,0.3); border-radius: var(--radius);
            padding: 16px; margin: 16px 0;
        }
        .idea-box h3 { color: var(--accent2); margin: 0 0 10px; font-size: 15px; }
        .idea-box ul { margin: 0; padding-left: 18px; }
        .idea-box li { margin-bottom: 5px; color: var(--text); }
        .error-box {
            background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.25);
            border-radius: var(--radius); padding: 16px; margin: 16px 0;
        }
        .error-box h3 { color: var(--danger); margin: 0 0 10px; font-size: 15px; }
        .error-box li { margin-bottom: 6px; color: var(--text); }
        .check-box {
            background: rgba(102,187,106,0.08); border: 1px solid rgba(102,187,106,0.25);
            border-radius: var(--radius); padding: 16px; margin: 16px 0;
        }
        .check-box h3 { color: var(--success); margin: 0 0 10px; font-size: 15px; }
        .conclusion-box {
            border-left-color: var(--success); background: rgba(102,187,106,0.06);
        }
        .detail-select {
            padding: 5px 8px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); border-radius: 5px; font-size: 12px; margin-left: 8px;
        }
        .step-btn {
            padding: 9px 16px; border-radius: 6px; background: var(--accent);
            color: #fff; border: none; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.2s; margin-top: 12px;
        }
        .step-btn:hover { background: var(--accent2); transform: translateY(-1px); }
        .step-btn:disabled { opacity: 0.4; cursor: default; transform: none; }

        /* ===== TOOLTIPS & ANIMATIONS ===== */
        .hint-trigger {
            display: inline-flex; align-items: center; justify-content: center;
            width: 22px; height: 22px; border-radius: 50%; background: rgba(0,150,136,0.2);
            color: var(--accent2); font-size: 13px; font-weight: 700; cursor: pointer;
            margin-left: 6px; animation: hintPulse 2.5s infinite ease-in-out;
            position: relative;
        }
        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,150,136,0.5); transform: scale(1); }
            50% { box-shadow: 0 0 0 7px rgba(0,150,136,0); transform: scale(1.05); }
        }
        @keyframes hintBounce {
            0% { transform: scale(1); }
            30% { transform: scale(1.2); }
            50% { transform: scale(0.95); }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .popover {
            display: none; position: fixed; background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
            border: 1.5px solid var(--accent); border-radius: 10px; padding: 14px 16px;
            max-width: 340px; z-index: 999; font-size: 13px; line-height: 1.5; color: var(--text);
            box-shadow: 0 12px 32px rgba(0,0,0,0.6); animation: popIn 0.25s ease;
            pointer-events: auto;
        }
        .popover::after {
            content: ''; position: absolute; width: 10px; height: 10px;
            background: var(--bg2); border-right: 1.5px solid var(--accent);
            border-bottom: 1.5px solid var(--accent); transform: rotate(45deg);
        }
        .popover.arrow-bottom::after { top: -6px; left: 24px; }
        .popover.arrow-top::after { bottom: -6px; left: 24px; transform: rotate(-135deg); }
        .popover.show { display: block; }
        .popover-close {
            position: absolute; top: 6px; right: 8px; background: none; border: none;
            color: var(--text2); cursor: pointer; font-size: 18px; line-height: 1; padding: 2px;
        }
        @keyframes popIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* ===== GEN & QUIZ ===== */
        .gen-box, .quiz-box {
            background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px; margin-top: 14px;
        }
        .gen-box h4, .quiz-box h4 { color: var(--accent2); margin-bottom: 10px; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .gen-task { background: var(--bg3); border-radius: 6px; padding: 12px; margin-bottom: 8px; font-size: 13px; line-height: 1.5; border: 1px solid transparent; animation: borderGlow 1.5s ease; }
        @keyframes borderGlow {
            0% { border-color: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
            100% { border-color: var(--border); box-shadow: none; }
        }
        .gen-answer { display: none; margin-top: 8px; padding: 8px; background: rgba(102,187,106,0.1); border-radius: 4px; font-size: 13px; color: var(--success); }
        .gen-answer.show { display: block; }
        .show-ans-btn {
            padding: 4px 10px; background: var(--bg2); border: 1px solid var(--border);
            color: var(--text2); border-radius: 4px; cursor: pointer; font-size: 11px; margin-top: 6px; transition: all 0.2s;
        }
        .show-ans-btn:hover { border-color: var(--accent); color: var(--accent2); }
        .quiz-opt {
            display: block; width: 100%; text-align: left; padding: 8px 12px; margin: 5px 0;
            background: var(--bg3); border: 1px solid var(--border); border-radius: 5px;
            color: var(--text); cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .quiz-opt:hover { border-color: var(--accent); background: var(--bg2); }
        .quiz-opt.correct { border-color: var(--success); background: rgba(102,187,106,0.12); color: var(--success); }
        .quiz-opt.wrong { border-color: var(--danger); background: rgba(239,83,80,0.12); color: var(--danger); }

        /* ===== PRINT ===== */
        @media print {
            .top-nav, .sticky-panel, .nav-controls, .zoom-controls, .gen-box, .quiz-box, .hint-trigger, .step-btn { display: none !important; }
            .main-layout { display: block; padding: 0; }
            body { background: #fff; color: #000; font-size: 12pt; }
            .step-block, .idea-box, .error-box, .check-box { background: #f7f7f7; border-color: #ccc; break-inside: avoid; page-break-inside: avoid; }
            h1, h2, h3 { color: #000 !important; border-bottom-color: #000 !important; }
            .step-block { border-left-color: #333 !important; }
            .step-block.highlight { border-left-color: #333 !important; box-shadow: none !important; background: #f9f9f9 !important; }
            math { color: #000 !important; }
            .conclusion-box { border-left-color: #2e7d32 !important; background: #f0f7f0 !important; }
        }
    </style>
</head>
<body>

<nav class="top-nav">
    <span class="nav-brand">📘 Планиметрия</span>
    <button class="nav-tab active" data-topic="0">Трапеция</button>
    <button class="nav-tab" data-topic="1">Прямоуг. треугольник</button>
    <button class="nav-tab" data-topic="2">Описанный четырёхугольник</button>
    <div class="nav-controls">
        <button class="nav-btn" id="btnStepMode" title="Пошаговый режим">⏱ По шагам</button>
        <button class="nav-btn" onclick="window.print()">🖨 Печать</button>
    </div>
</nav>

<div class="main-layout">
    <main class="solution-col" id="solutionCol"></main>

    <aside class="sticky-panel" id="stickyPanel">
        <div class="canvas-wrap">
            <canvas id="mainCanvas" width="400" height="320"></canvas>
        </div>
        <div class="zoom-controls">
            <button class="zoom-btn" id="zoomIn">+</button>
            <input type="range" class="zoom-slider" id="zoomSlider" min="0.5" max="3" step="0.1" value="1">
            <button class="zoom-btn" id="zoomOut">−</button>
            <span class="zoom-val" id="zoomVal">100%</span>
            <button class="zoom-btn" id="zoomReset" title="Сброс">↺</button>
        </div>
        <div class="toggle-row" id="toggleRow"></div>
        <div class="legend-box" id="legendBox"></div>
        <div class="gen-box">
            <h4>🎲 Генератор задач <span class="hint-trigger" data-hint="gen" tabindex="0" aria-label="Подсказка по генератору">?</span></h4>
            <div id="genTaskArea"></div>
            <button class="step-btn" id="btnGenerate" style="width:100%;margin-top:8px">Сгенерировать задачу</button>
        </div>
        <div class="quiz-box">
            <h4>📝 Мини-квиз</h4>
            <div id="quizArea"></div>
        </div>
    </aside>
</div>

<div class="popover" id="popover" role="tooltip" aria-hidden="true" aria-live="polite"></div>

<script>
    /* ===== STATE & UTILS ===== */
    const state = {
        topic: 0, stepMode: false, currentStep: 0, detail: 'standard',
        zoom: 1, pan: {x:0,y:0}, isDragging: false, dragStart: {x:0,y:0},
        toggles: {}, highlightStep: null, genCount: 0
    };
    const $ = s => document.querySelector(s);
    const randInt = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
    const fmt = v => Number.isInteger(v) ? v.toString() : v.toFixed(1);

    /* ===== TOPICS DATA ===== */
    const TOPICS = [
        {
            id:'trapezoid', title:'Средняя линия трапеции и диагонали',
            given:'Дано: <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>M</mi><mi>N</mi><mo>=</mo><mn>24</mn></math> см. Диагональ делит среднюю линию в отношении <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>7</mn><mo>:</mo><mn>5</mn></math>.',
            find:'Найти: меньшее основание трапеции <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi></math>.',
            meaning:'Средняя линия трапеции делится диагональю на два отрезка. Каждый из них является средней линией соответствующего треугольника, образованного диагональю и основаниями.',
            interp:'Пусть <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>M</mi><mi>K</mi><mo>=</mo><mn>7</mn><mi>x</mi></math>, <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>K</mi><mi>N</mi><mo>=</mo><mn>5</mn><mi>x</mi></math>. Тогда <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>M</mi><mi>N</mi><mo>=</mo><mn>12</mn><mi>x</mi><mo>=</mo><mn>24</mn></math>. Меньшее основание <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi><mo>=</mo><mn>2</mn><mo>⋅</mo><mi>K</mi><mi>N</mi><mo>=</mo><mn>10</mn><mi>x</mi></math>.',
            idea:['Ввести коэффициент <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>x</mi></math> для отношения отрезков.','Выразить полную среднюю линию через <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>x</mi></math> и найти его.','Меньшее основание равно удвоенному меньшему отрезку на средней линии.'],
            steps:[
                {label:'Шаг 1. Обозначения', text:'Пусть отрезки равны <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>M</mi><mi>K</mi><mo>=</mo><mn>7</mn><mi>x</mi></math> и <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>K</mi><mi>N</mi><mo>=</mo><mn>5</mn><mi>x</mi></math>. Здесь <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>M</mi><mi>K</mi></math> — средняя линия <math xmlns="http://www.w3.org/1998/Math/MathML"><mi mathvariant="normal">△</mi><mi>A</mi><mi>B</mi><mi>D</mi></math>, а <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>K</mi><mi>N</mi></math> — средняя линия <math xmlns="http://www.w3.org/1998/Math/MathML"><mi mathvariant="normal">△</mi><mi>B</mi><mi>C</mi><mi>D</mi></math>.'},
                {label:'Шаг 2. Уравнение', text:'Сумма отрезков равна известной средней линии: <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>7</mn><mi>x</mi><mo>+</mo><mn>5</mn><mi>x</mi><mo>=</mo><mn>24</mn></math>.'},
                {label:'Шаг 3. Находим x', text:'<math xmlns="http://www.w3.org/1998/Math/MathML"><mn>12</mn><mi>x</mi><mo>=</mo><mn>24</mn></math>, значит <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>x</mi><mo>=</mo><mn>2</mn></math>.'},
                {label:'Шаг 4. Меньшее основание', text:'<math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi><mo>=</mo><mn>2</mn><mo>⋅</mo><mi>K</mi><mi>N</mi><mo>=</mo><mn>2</mn><mo>⋅</mo><mn>5</mn><mi>x</mi><mo>=</mo><mn>10</mn><mo>⋅</mo><mn>2</mn><mo>=</mo><mn>20</mn></math> см.'},
                {label:'Шаг 5. Проверка', text:'Большее основание <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>A</mi><mi>D</mi><mo>=</mo><mn>2</mn><mo>⋅</mo><mi>M</mi><mi>K</mi><mo>=</mo><mn>14</mn><mo>⋅</mo><mn>2</mn><mo>=</mo><mn>28</mn></math>. Сред. линия: <math xmlns="http://www.w3.org/1998/Math/MathML"><mo>(</mo><mn>28</mn><mo>+</mo><mn>20</mn><mo>)</mo><mo>/</mo><mn>2</mn><mo>=</mo><mn>24</mn></math>. Верно.'}
            ],
            conclusion:'Меньшее основание трапеции равно <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>20</mn></math> см.',
            errors:['Путаница, какой отрезок к какому основанию относится. Помните: отрезок, прилежащий к стороне <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi></math>, равен <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi><mo>/</mo><mn>2</mn></math>.','Использование формулы полусуммы оснований без нахождения <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>x</mi></math>.','Ошибка в пропорции: сумма частей <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>7</mn><mo>+</mo><mn>5</mn><mo>=</mo><mn>12</mn></math>, а не <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>35</mn></math>.'],
            check:'Проверим: <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>A</mi><mi>D</mi><mo>=</mo><mn>28</mn></math>, <math xmlns="http://www.w3.org/1998/Math/MathML"><mi>B</mi><mi>C</mi><mo>=</mo><mn>20</mn></math>. Средняя линия <math xmlns="http://www.w3.org/1998/Math/MathML"><mo>(</mo><mn>28</mn><mo>+</mo><mn>20</mn><mo>)</mo><mo>/</mo><mn>2</mn><mo>=</mo><mn>24</mn></math>. Отношение <math xmlns="http://www.w3.org/1998/Math/MathML"><mn>14</mn><mo>:</mo><mn>10</mn><mo>=</mo><mn>7</mn><mo>:</mo><mn>5</mn></math>. Всё сходится.',
            toggles:[{id:'showMid',label:'Средняя линия',on:true},{id:'showDiag',label:'Диагональ',on:true},{id:'showLabels',label:'Метки',on:true}],
            legend:[{color:'#00b3b3',text:'Средняя линия MN'},{color:'#e5c07b',text:'Диагональ BD'},{color:'#e6edf3',text:'Основания AD, BC'}],
            genTypes:['std','rev','base'],
            generate(t){
                if(t==='std'){let a=randInt(16,40),r1=randInt(3,7),r2=randInt(2,5);let x=a/(r1+r2),bc=2*Math.min(r1,r2)*x;return{q:`Средняя линия равна ${a}. Диагональ делит её как ${r1}:${r2}. Найти меньшее основание.`,a:fmt(bc),idea:'x=MN/(r1+r2). BC=2·min(r1,r2)·x.'}}

    /* ===== RENDERING ===== */
    function render(){
        const T = TOPICS[state.topic];
        const col = $('#solutionCol');
        let h = `<h1>${T.title}</h1>`;
        h += `<div class="step-block"><div class="step-label">1. Дано</div><p>${T.given}</p><p><strong>${T.find}</strong></p></div>`;
        h += `<div class="step-block"><div class="step-label">2. Смысл условий</div><p>${T.meaning}</p></div>`;
        h += `<div class="step-block"><div class="step-label">3. Интерпретация</div><p>${T.interp}</p></div>`;
        h += `<div class="idea-box"><h3>💡 Идея решения</h3><ul>${T.idea.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;
        h += `<h2>4. Пошаговое решение</h2>`;
        T.steps.forEach((s,i)=>{
            const show = !state.stepMode || i <= state.currentStep;
            const active = state.stepMode && i === state.currentStep;
            h += `<div class="step-block ${active?'highlight':''}" data-step="${i}" style="${show?'':'display:none'}" onmouseenter="canvasHighlight(${i})" onmouseleave="canvasUnhighlight()">
      <div class="step-label">${s.label} <span class="hint-trigger" data-hint="step${i}" tabindex="0" aria-label="Подсказка по шагу ${i+1}">?</span></div>
      <p>${state.detail==='brief'?s.text.replace(/ Здесь.*/,'.'):s.text+(state.detail==='detailed'?[' Это ключевой момент.',' Обратите внимание на преобразования.',' Используем свойство подобия/средней линии.',' Подстановка и арифметика.',' Проверка подтверждает корректность.'][i]:'')}</p>
    </div>`;
        });
        if(state.stepMode && state.currentStep < T.steps.length-1)
        h += `<button class="step-btn" id="btnNext">Следующий шаг →</button>`;
        h += `<div class="check-box"><h3>6. Проверка</h3><p>${T.check}</p><p><strong>Других решений нет, так как уравнение линейное с одним корнем.</strong></p></div>`;
        h += `<div class="error-box"><h3>⚠️ Типичные ошибки</h3><ul>${T.errors.map(e=>`<li>${e}</li>`).join('')}</ul></div>`;
        h += `<div class="step-block conclusion-box"><div class="step-label" style="color:var(--success)">7. Вывод</div><p style="font-size:16px">${T.conclusion}</p></div>`;
        h += `<div style="margin-top:16px;display:flex;align-items:center;flex-wrap:wrap;gap:8px"><span style="font-size:13px;color:var(--text2)">Подробность:</span>
    <select class="detail-select" id="detailSel"><option value="brief" ${state.detail==='brief'?'selected':''}>Кратко</option><option value="standard" ${state.detail==='standard'?'selected':''}>Стандартно</option><option value="detailed" ${state.detail==='detailed'?'selected':''}>Очень подробно</option></select></div>`;
        col.innerHTML = h;
        if(state.stepMode) $('#btnNext').onclick = nextStep;
        $('#detailSel').onchange = (e)=>{state.detail=e.target.value;render()};
        renderToggles(T);
        renderLegend(T);
        drawCanvas();
        renderQuiz(T);
        generateTask(T, true);
        attachHints();
        setTimeout(()=>{ if(!sessionStorage.getItem('hintDone')) showFirstHint(); sessionStorage.setItem('hintDone','1'); }, 3000);
    }

    function nextStep(){ state.currentStep++; render(); }
    function renderToggles(T){
        const r = $('#toggleRow'); r.innerHTML='';
        T.toggles.forEach(t=>{
            if(state.toggles[t.id]===undefined) state.toggles[t.id]=t.on;
            const b = document.createElement('button');
            b.className='toggle-btn'+(state.toggles[t.id]?' on':'');
            b.textContent=t.label;
            b.onclick=()=>{state.toggles[t.id]=!state.toggles[t.id];b.classList.toggle('on');drawCanvas()};
            r.appendChild(b);
        });
    }
    function renderLegend(T){
        const l = $('#legendBox'); l.innerHTML='';
        T.legend.forEach(item=>{
            l.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${item.color}"></div>${item.text}</div>`;
        });
    }

    /* ===== CANVAS ===== */
    const cvs = $('#mainCanvas');
    const cx = cvs.getContext('2d');
    function setZoom(v){ state.zoom=Math.max(0.5,Math.min(3,v)); $('#zoomSlider').value=state.zoom; $('#zoomVal').textContent=Math.round(state.zoom*100)+'%'; drawCanvas(); }
    function drawCanvas(){
        const T = TOPICS[state.topic];
        const w = cvs.width, h = cvs.height;
        cx.clearRect(0,0,w,h);
        cx.save();
        cx.translate(w/2+state.pan.x, h/2+state.pan.y);
        cx.scale(state.zoom, state.zoom);
        cx.translate(-w/2, -h/2);
        const on = id => state.toggles[id]!==false;

        if(T.id==='trapezoid'){
            const A=[40,h-30], D=[w-40,h-30], B=[90,40], C=[w-90,40];
            cx.strokeStyle='#e6edf3'; cx.lineWidth=2;
            cx.beginPath(); cx.moveTo(...A); cx.lineTo(...B); cx.lineTo(...C); cx.lineTo(...D); cx.closePath(); cx.stroke();
            if(on('showDiag')){cx.strokeStyle='rgba(229,192,123,0.6)';cx.lineWidth=1.5;cx.setLineDash([5,4]);cx.beginPath();cx.moveTo(...B);cx.lineTo(...D);cx.stroke();cx.setLineDash([])}
            if(on('showMid')){
                const M=[(A[0]+B[0])/2,(A[1]+B[1])/2], N=[(C[0]+D[0])/2,(C[1]+D[1])/2];
                cx.strokeStyle='#00b3b3'; cx.lineWidth=2.5;
                cx.beginPath(); cx.moveTo(...M); cx.lineTo(...N); cx.stroke();
                const K=[(B[0]+D[0])/2,(B[1]+D[1])/2];
                cx.fillStyle='#00b3b3'; cx.font='11px sans-serif';
                cx.fillText('M',M[0]-10,M[1]-5); cx.fillText('N',N[0]+4,N[1]-5); cx.fillText('K',K[0]+4,K[1]-5);
            }
            if(on('showLabels')){
                cx.fillStyle='#8b949e'; cx.font='12px sans-serif';
                cx.fillText('A',A[0]-10,A[1]+14); cx.fillText('D',D[0]+4,D[1]+14);
                cx.fillText('B',B[0]-8,B[1]-4); cx.fillText('C',C[0]+4,C[1]-4);
            }
            const hl = state.highlightStep;
            if(hl===3){cx.strokeStyle='#e06c75';cx.lineWidth=3;cx.beginPath();cx.moveTo(...B);cx.lineTo(...C);cx.stroke();}
            if(hl===4){cx.strokeStyle='#50b86c';cx.lineWidth=3;cx.beginPath();cx.moveTo(...A);cx.lineTo(...D);cx.stroke();}
        } else if(T.id==='triangle'){
            const C=[50,h-40], A=[50,50], B=[w-40,h-40];
            const dx=B[0]-A[0], dy=B[1]-A[1];
            const t=((C[0]-A[0])*dx+(C[1]-A[1])*dy)/(dx*dx+dy*dy);
            const H=[A[0]+t*dx, A[1]+t*dy];
            cx.strokeStyle='#e6edf3'; cx.lineWidth=2;
            cx.beginPath(); cx.moveTo(...C); cx.lineTo(...A); cx.lineTo(...B); cx.closePath(); cx.stroke();
            if(on('showHeight')){cx.strokeStyle='#e5c07b';cx.lineWidth=2;cx.setLineDash([4,3]);cx.beginPath();cx.moveTo(...C);cx.lineTo(...H);cx.stroke();cx.setLineDash([])}
            if(on('showRight')){
                cx.strokeStyle='#8b949e'; cx.lineWidth=1;
                cx.beginPath(); cx.moveTo(C[0]+10,C[1]); cx.lineTo(C[0]+10,C[1]-10); cx.lineTo(C[0],C[1]-10); cx.stroke();
            }
            if(on('showAngles')){
                cx.fillStyle='#00b3b3'; cx.font='12px sans-serif';
                cx.fillText('∠B=55°',B[0]-32,B[1]-10); cx.fillText('∠A=35°',A[0]+8,A[1]+16); cx.fillText('∠ACH=55°',(C[0]+H[0])/2+6,(C[1]+H[1])/2-4);
            }
            cx.fillStyle='#8b949e'; cx.font='12px sans-serif';
            cx.fillText('C',C[0]-14,C[1]+14); cx.fillText('A',A[0]-12,A[1]-6); cx.fillText('B',B[0]+4,B[1]+14); cx.fillText('H',H[0]+4,H[1]+4);
            const hl = state.highlightStep;
            if(hl===2){cx.strokeStyle='#e06c75';cx.lineWidth=3;cx.beginPath();cx.moveTo(...C);cx.lineTo(...H);cx.stroke();}
        } else if(T.id==='quad'){
            const A=[60,h-30], B=[40,50], C=[w-60,60], D=[w-40,h-30];
            if(on('showCircle')){
                const o=[(A[0]+B[0]+C[0]+D[0])/4+5,(A[1]+B[1]+C[1]+D[1])/4-10];
                cx.strokeStyle='rgba(0,150,136,0.4)'; cx.lineWidth=1.5; cx.setLineDash([3,3]);
                cx.beginPath(); cx.arc(o[0],o[1],55,0,Math.PI*2); cx.stroke(); cx.setLineDash([]);
                cx.fillStyle='rgba(0,150,136,0.12)'; cx.beginPath(); cx.arc(o[0],o[1],55,0,Math.PI*2); cx.fill();
            }
            cx.strokeStyle='#e6edf3'; cx.lineWidth=2;
            cx.beginPath(); cx.moveTo(...A); cx.lineTo(...B); cx.lineTo(...C); cx.lineTo(...D); cx.closePath(); cx.stroke();
            if(on('showSides')){
                cx.fillStyle='#e5c07b'; cx.font='11px sans-serif';
                cx.fillText('12',(A[0]+B[0])/2-16,(A[1]+B[1])/2); cx.fillText('9',(B[0]+C[0])/2-4,(B[1]+C[0])/2-6);
                cx.fillText('15',(C[0]+D[0])/2+4,(C[1]+D[1])/2); cx.fillText('18',(A[0]+D[0])/2-6,(A[1]+D[1])/2+14);
            }
            cx.fillStyle='#8b949e'; cx.font='12px sans-serif';
            cx.fillText('A',A[0]-12,A[1]+14); cx.fillText('B',B[0]-12,B[1]-6); cx.fillText('C',C[0]+4,C[1]-6); cx.fillText('D',D[0]+4,D[1]+14);
            const hl = state.highlightStep;
            if(hl===2){cx.strokeStyle='#e06c75';cx.lineWidth=3;cx.beginPath();cx.moveTo(...A);cx.lineTo(...D);cx.stroke();}
        }
        cx.restore();
    }
    function canvasHighlight(i){ state.highlightStep=i; drawCanvas(); }
    function canvasUnhighlight(){ state.highlightStep=null; drawCanvas(); }

    /* ===== ZOOM & PAN ===== */
    $('#zoomIn').onclick=()=>setZoom(state.zoom+0.1);
    $('#zoomOut').onclick=()=>setZoom(state.zoom-0.1);
    $('#zoomReset').onclick=()=>{state.zoom=1;state.pan={x:0,y:0};$('#zoomSlider').value=1;$('#zoomVal').textContent='100%';drawCanvas()};
    $('#zoomSlider').oninput=(e)=>setZoom(parseFloat(e.target.value));
    cvs.addEventListener('wheel',e=>{e.preventDefault();setZoom(state.zoom+(e.deltaY>0?-0.05:0.05));},{passive:false});
    cvs.addEventListener('mousedown',e=>{state.isDragging=true;state.dragStart={x:e.clientX,y:e.clientY}});
    cvs.addEventListener('mousemove',e=>{if(!state.isDragging)return;state.pan.x+=e.clientX-state.dragStart.x;state.pan.y+=e.clientY-state.dragStart.y;state.dragStart={x:e.clientX,y:e.clientY};drawCanvas()});
    cvs.addEventListener('mouseup',()=>state.isDragging=false);
    cvs.addEventListener('mouseleave',()=>state.isDragging=false);
    cvs.addEventListener('touchstart',e=>{state.isDragging=true;state.dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY}},{passive:false});
    cvs.addEventListener('touchmove',e=>{if(!state.isDragging)return;e.preventDefault();state.pan.x+=e.touches[0].clientX-state.dragStart.x;state.pan.y+=e.touches[0].clientY-state.dragStart.y;state.dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};drawCanvas()},{passive:false});
    cvs.addEventListener('touchend',()=>state.isDragging=false);

    /* ===== GEN & QUIZ ===== */
    function generateTask(T, init=false){
        const t = T.genTypes[Math.floor(Math.random()*T.genTypes.length)];
        const task = T.generate(t);
        state.genCount++;
        const area = $('#genTaskArea');
        area.innerHTML = `<div class="gen-task"><div><strong>Задача ${state.genCount}:</strong> ${task.q}</div>
  <div class="gen-answer" id="ga${state.genCount}"><strong>Ответ:</strong> ${task.a}<br><em>Идея: ${task.idea}</em></div>
  <button class="show-ans-btn" onclick="this.previousElementSibling.classList.add('show');this.style.display='none'">Показать ответ</button></div>`;
    }
    function renderQuiz(T){
        const q = $('#quizArea');
        q.innerHTML = `<p style="font-size:13px;margin-bottom:8px">${T.quiz.q}</p>`;
        T.quiz.opts.forEach((o,i)=>{
            const b = document.createElement('button');
            b.className='quiz-opt'; b.textContent=o;
            b.onclick=()=>{
                q.querySelectorAll('.quiz-opt').forEach(x=>{x.classList.remove('correct','wrong');x.disabled=true});
                b.classList.add(i===T.quiz.correct?'correct':'wrong');
                if(i!==T.quiz.correct) q.children[i+1].classList.add('correct');
            };
            q.appendChild(b);
        });
    }

    /* ===== TOOLTIPS ===== */
    const HINTS={gen:{text:'Генерирует новую задачу с случайными, но корректными параметрами. Ответ скрыт — используйте кнопку для самопроверки. Модель обновится автоматически.',act:['Сгенерировать сейчас']},step0:{text:'Вводим переменную x и связываем её с геометрическими отрезками. Это база для алгебраизации.'},step1:{text:'Составляем уравнение, опираясь на известную длину средней линии. Сумма частей = целому.'},step2:{text:'Простое линейное уравнение. Проверяем арифметику перед подстановкой обратно в формулу.'}};
    let activePop=null, popTimer=null;
    function attachHints(){
        document.querySelectorAll('.hint-trigger').forEach(tr=>{
            tr.onmouseenter = (e)=>showHint(e.currentTarget);
            tr.onfocus = (e)=>showHint(e.currentTarget);
            tr.onclick = (e)=>{e.stopPropagation();showHint(e.currentTarget)};
        });
    }
    function showHint(el){
        const key = el.dataset.hint;
        const d = HINTS[key]; if(!d) return;
        const p = $('#popover');
        p.innerHTML = `<button class="popover-close" onclick="closePop()">×</button><div>${d.text}</div>` +
        (d.act?d.act.map(a=>`<button class="step-btn" style="margin-top:8px;font-size:11px;padding:4px 10px" onclick="generateTask(TOPICS[state.topic]);closePop()">${a}</button>`).join(''):'');
        const r = el.getBoundingClientRect();
        p.style.left = Math.max(10, Math.min(r.left - 110, window.innerWidth - 350)) + 'px';
        p.style.top = (r.bottom + 10) + 'px';
        p.className = 'popover arrow-top show';
        p.setAttribute('aria-hidden','false');
        activePop=p;
        clearTimeout(popTimer);
        popTimer=setTimeout(closePop, 15000);
    }
    function closePop(){
        const p=$('#popover'); p.className='popover'; p.setAttribute('aria-hidden','true'); activePop=null; clearTimeout(popTimer);
    }
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closePop()});
    document.addEventListener('click',e=>{if(!e.target.closest('.hint-trigger')&&!e.target.closest('.popover'))closePop()});
    function showFirstHint(){const t=document.querySelector('.hint-trigger[data-hint="gen"]');if(t){t.style.animation='hintBounce 0.6s ease';showHint(t)}}

    /* ===== INIT ===== */
    $('#btnStepMode').onclick=()=>{state.stepMode=!state.stepMode;state.currentStep=0;render()};
    document.querySelectorAll('.nav-tab').forEach(t=>t.onclick=()=>{
        document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        state.topic=parseInt(t.dataset.topic);
        state.currentStep=0;
        state.highlightStep=null;
        render();
    });
    render();
</script>
</body>
</html>
